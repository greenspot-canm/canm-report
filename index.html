<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CAN-M Report</title>

<style>

body{

font-family:Arial,sans-serif;

background:#f5f5f5;

margin:0;

padding:20px;

}

.container{

max-width:600px;

margin:auto;

background:white;

padding:25px;

border-radius:12px;

box-shadow:0 0 10px rgba(0,0,0,.15);

}

h1{

text-align:center;

color:#00843D;

}

label{

display:block;

margin-top:15px;

font-weight:bold;

}

input,select,textarea{

width:100%;

padding:10px;

margin-top:5px;

border-radius:6px;

border:1px solid #ccc;

box-sizing:border-box;

}

button{

margin-top:20px;

width:100%;

padding:15px;

background:#00843D;

color:white;

font-size:18px;

border:none;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#006d31;

}

</style>

</head>

<body>

<div class="container">

<h1>CAN-M Report</h1>

<label>Employee ID</label>

<input type="text">

<label>ประเภท CAN-M</label>

<select>

<option>Unsafe Condition</option>

<option>Unsafe Action</option>

<option>Near Miss</option>

</select>

<label>พื้นที่</label>

<select>

<option>RS</option>

<option>NK</option>

<option>KL</option>

</select>

<label>รายละเอียด</label>

<textarea rows="5"></textarea>

<button>

ส่งรายงาน

</button>

</div>

</body>

</html>
