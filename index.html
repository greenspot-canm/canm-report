<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CAN-M Report</title>

    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="card">

        <h1>CAN-M Report</h1>
        <h3>ระบบแจ้งเหตุความปลอดภัย</h3>

        <img id="picture" alt="profile">

        <h2 id="name">Loading...</h2>
        <p id="userid"></p>

        <button onclick="logout()">Logout</button>

    </div>

    <script>
        // ใส่ LIFF ID ของคุณ
        const liffId = "2010511753-AF9f8UtS";

        async function main() {

            try {
                await liff.init({ liffId });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();

                document.getElementById("picture").src = profile.pictureUrl;
                document.getElementById("name").innerText = profile.displayName;
                document.getElementById("userid").innerText = "UserID: " + profile.userId;

            } catch (err) {
                console.log(err);
                alert("LIFF Error: " + err.message);
            }
        }

        main();

        function logout() {
            liff.logout();
            location.reload();
        }
    </script>

</body>

</html>
