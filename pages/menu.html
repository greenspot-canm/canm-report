<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAN-M Menu</title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="card">

    <img id="picture" class="profile">

    <h2 id="name">Loading...</h2>

    <p>ยินดีต้อนรับเข้าสู่ระบบ</p>

    <button onclick="goReport()">
        📋 แจ้งเหตุ
    </button>

    <br><br>

    <button onclick="logout()">
        Logout
    </button>

</div>

<script>

const liffId = "2010511753-AF9f8UtS";

async function main(){

    await liff.init({
        liffId:liffId
    });

    if(!liff.isLoggedIn()){
        liff.login();
        return;
    }

    const profile = await liff.getProfile();

    document.getElementById("picture").src = profile.pictureUrl;

    document.getElementById("name").innerHTML = profile.displayName;

}

main();

function goReport(){

    window.location.href = "report.html";

}

function logout(){

    liff.logout();

    location.reload();

}

</script>

</body>
</html>
